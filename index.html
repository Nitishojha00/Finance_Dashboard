<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Finance Dashboard</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Finance Dashboard</h1>
            <div class="header-controls">
                <button id="darkModeToggle" class="btn btn-outline"><i class="fas fa-moon"></i> Dark</button>
                <div class="role-selector">
                    <label><i class="fas fa-user-tag"></i> Role:</label>
                    <select id="roleSelect">
                        <option value="viewer">Viewer (read only)</option>
                        <option value="admin">Admin (full control)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards" id="summaryCards">
            <div class="card"><h3>Total Balance</h3><div class="value" id="totalBalance">₹0</div></div>
            <div class="card"><h3>Total Income</h3><div class="value" id="totalIncome">₹0</div></div>
            <div class="card"><h3>Total Expenses</h3><div class="value" id="totalExpenses">₹0</div></div>
        </div>

        <!-- Charts Row -->
        <div class="charts-row">
            <div class="chart-container">
                <h3>Balance Trend</h3>
                <div class="range-buttons">
                    <button data-range="3" class="range-btn active">3D</button>
                    <button data-range="7" class="range-btn">7D</button>
                    <button data-range="30" class="range-btn">30D</button>
                    <button data-range="60" class="range-btn">2M</button>
                    <button data-range="90" class="range-btn">3M</button>
                    <button data-range="365" class="range-btn">1Y</button>
                </div>
                <canvas id="timeChart"></canvas>
                <div id="timeChartEmptyMsg" class="empty-chart-msg" style="display:none;">No data for trend chart</div>
            </div>
            <div class="chart-container">
                <h3>Spending by Category</h3>
                <canvas id="categoryChart"></canvas>
                <div id="categoryChartEmptyMsg" class="empty-chart-msg" style="display:none;">No expense data available</div>
            </div>
        </div>

        <!-- Transactions Section -->
        <div class="transactions-section">
            <div class="section-header">
                <h2><i class="fas fa-list-ul"></i> Transactions</h2>
                <div class="filters">
                    <input type="text" id="searchInput" placeholder="Search (category/type)" autocomplete="off">
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                    </select>
                    <select id="typeFilter">
                        <option value="">All Types</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <select id="sortBy">
                        <option value="date_desc">Date (newest first)</option>
                        <option value="date_asc">Date (oldest first)</option>
                        <option value="amount_desc">Amount (high to low)</option>
                        <option value="amount_asc">Amount (low to high)</option>
                    </select>
                    <button id="addTransactionBtn" class="btn btn-primary" style="display: none;"><i class="fas fa-plus"></i> Add</button>
                </div>
            </div>

            <!-- NEW: Custom Date Range Filter -->
            <div class="date-range-filter">
                <label><i class="fas fa-calendar-alt"></i> From:</label>
                <input type="date" id="dateFrom">
                <label>To:</label>
                <input type="date" id="dateTo">
                <button id="applyRangeBtn" class="btn btn-sm">Apply Range</button>
                <button id="clearRangeBtn" class="btn btn-sm btn-outline">Clear</button>
            </div>

            <!-- NEW: Period Summary Card -->
            <div id="periodSummary" class="period-summary" style="display: none;"></div>

            <div id="transactionListContainer">
                <table id="transactionTable">
                    <thead>
                        <tr><th>Date</th><th>Category</th><th>Amount (₹)</th><th>Type</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="transactionTbody"></tbody>
                </table>
            </div>
        </div>

        <!-- Insights Section -->
        <div class="insights">
            <h3><i class="fas fa-lightbulb"></i> Insights</h3>
            <div class="insight-grid" id="insightsGrid"></div>
        </div>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Transaction</h3>
            <input type="date" id="modalDate" required>
            <input type="text" id="modalCategory" placeholder="Category (e.g., Food, Rent, Salary)" required>
            <input type="number" id="modalAmount" placeholder="Amount (₹)" step="any" required>
            <select id="modalType">
                <option value="expense">Expense</option>
                <option value="income">Income</option>
            </select>
            <div class="modal-actions">
                <button id="modalCancel" class="btn">Cancel</button>
                <button id="modalSave" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script type="module" src="state.js"></script>
    <script type="module" src="utils.js"></script>
    <script type="module" src="chart.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
